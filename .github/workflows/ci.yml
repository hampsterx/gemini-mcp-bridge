name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      # Smoke test: verify package contents are complete after build
      - name: Verify package contents
        run: |
          npm pack --dry-run 2>&1 | tee /tmp/pack-output.txt
          # Ensure dist/ entry point exists
          test -f dist/index.js || (echo "FAIL: dist/index.js missing" && exit 1)
          test -f dist/server.js || (echo "FAIL: dist/server.js missing" && exit 1)
          # Ensure prompts are included (used by search/structured tools and query change-mode)
          ls prompts/*.md > /dev/null 2>&1 || (echo "FAIL: prompts/ missing" && exit 1)
