# gemini-mcp-bridge review policy
# Allows read-only git commands for code review. Blocks all other shell commands.

[[rule]]
toolName = "run_shell_command"
commandPrefix = ["git diff", "git log", "git show", "git status", "git rev-parse", "git branch", "git merge-base"]
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
decision = "deny"
priority = 50
deny_message = "Only read-only git commands are permitted by gemini-mcp-bridge"
